<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC/R Refrigerant Recovery Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .valve-closed { stroke: #ef4444; fill: #ef4444; }
        .valve-open { stroke: #22c55e; fill: #22c55e; }
        .hose { stroke: #38bdf8; stroke-width: 4; fill: none; stroke-dasharray: 4; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-8">
        <h1 class="text-3xl font-bold text-sky-400">HVAC/R Recovery Simulator</h1>
        <p class="text-slate-400">Follow the EPA-compliant recovery steps to evacuate the system.</p>
    </header>

    <main class="max-w-4xl mx-auto grid md:grid-cols-2 gap-8">
        <div class="bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700">
            <h2 class="text-xl font-semibold mb-4 text-sky-300">System Dashboard</h2>
            <svg viewBox="0 0 200 160" class="w-full h-auto">
                <!-- AC Unit -->
                <rect x="20" y="20" width="80" height="60" fill="#475569" rx="4" />
                <text x="60" y="55" text-anchor="middle" font-size="12" fill="white">AC UNIT</text>
                
                <!-- Tank -->
                <rect x="120" y="80" width="60" height="70" fill="#334155" rx="5" />
                <text x="150" y="120" text-anchor="middle" font-size="12" fill="white">TANK</text>

                <!-- Hoses -->
                <path id="hoseAC" d="M 60 80 Q 60 100 100 100" class="hose" />
                <path id="hoseTank" d="M 150 80 Q 150 60 100 60" class="hose" />

                <!-- Valves -->
                <circle id="valveAC" cx="60" cy="80" r="6" class="valve-closed cursor-pointer" onclick="toggleValve('AC')" />
                <circle id="valveTank" cx="150" cy="80" r="6" class="valve-closed cursor-pointer" onclick="toggleValve('Tank')" />
            </svg>
            <div class="mt-4 flex gap-2">
                <button id="btnStart" onclick="runMachine()" class="bg-sky-600 hover:bg-sky-500 px-4 py-2 rounded font-bold uppercase w-full">Start Recovery</button>
            </div>
        </div>

        <div class="space-y-4">
            <div id="instructionBox" class="bg-slate-800 p-6 rounded-xl border-l-4 border-sky-500">
                <h3 id="stepTitle" class="font-bold text-lg mb-2">Step 1: Open AC Service Valve</h3>
                <p id="stepDesc">Click the red valve on the AC unit to connect to the recovery machine.</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl">
                <h4 class="font-semibold text-slate-400 mb-2">Live Telemetry</h4>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-3 rounded">AC PSI: <span id="psiVal" class="text-green-400 font-mono">120</span></div>
                    <div class="bg-slate-900 p-3 rounded">Machine: <span id="machineStatus" class="text-red-400 font-bold">OFF</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let state = {
            ACValve: false,
            TankValve: false,
            machineRunning: false,
            psi: 120,
            step: 0
        };

        function toggleValve(type) {
            if (state.machineRunning) return;
            
            if(type === 'AC') {
                state.ACValve = !state.ACValve;
                document.getElementById('valveAC').setAttribute('class', state.ACValve ? 'valve-open cursor-pointer' : 'valve-closed cursor-pointer');
                if(state.step === 0 && state.ACValve) {
                    state.step = 1;
                    document.getElementById('stepTitle').innerText = "Step 2: Open Tank Valve";
                    document.getElementById('stepDesc').innerText = "Open the valve on the recovery tank to receive the refrigerant.";
                }
            } else {
                state.TankValve = !state.TankValve;
                document.getElementById('valveTank').setAttribute('class', state.TankValve ? 'valve-open cursor-pointer' : 'valve-closed cursor-pointer');
                if(state.step === 1 && state.TankValve) {
                    state.step = 2;
                    document.getElementById('stepTitle').innerText = "Step 3: Begin Recovery";
                    document.getElementById('stepDesc').innerText = "Everything is connected. Click 'Start Recovery'.";
                }
            }
        }

        function runMachine() {
            if(state.ACValve && state.TankValve) {
                state.machineRunning = true;
                document.getElementById('machineStatus').innerText = "RUNNING";
                document.getElementById('machineStatus').className = "text-green-400 font-bold";
                reducePressure();
            } else {
                alert("Check connections: Both AC and Tank valves must be open!");
            }
        }

        function reducePressure() {
            if(state.psi > 0) {
                state.psi -= 10;
                document.getElementById('psiVal').innerText = state.psi;
                setTimeout(reducePressure, 400);
            } else {
                document.getElementById('machineStatus').innerText = "COMPLETE";
                document.getElementById('stepTitle').innerText = "Recovery Finished";
                document.getElementById('stepDesc').innerText = "System empty. Remember to close the tank valve first before disconnecting.";
            }
        }
    </script>
</body>
</html>
